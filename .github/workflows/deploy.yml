name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (OpenNext Cloudflare)
        run: npx opennextjs-cloudflare build --dangerouslyUseUnsupportedNextVersion
        env:
          NEXT_PUBLIC_APP_URL: https://tkd.genomic.cc

      - name: Deploy to Cloudflare Workers
        run: npx wrangler@4 deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}

      - name: Smoke test
        continue-on-error: true
        run: |
          sleep 15
          echo "Testing workers URL..."
          curl -v https://tkd-platform.pensive-kim.workers.dev/api/health || true
          echo "Testing pages URL..."
          curl -v https://tkd-platform.pages.dev/api/health || true
